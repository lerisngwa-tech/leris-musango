name: ci cd pipelinelsls
on:
  push:
    branches:
      - develop

    
jobs:
  build:
      runs-on: ubuntu-latest
    
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      
  containerize:
      runs-on: ubuntu-latest
      needs: build

      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup Docker
        uses: docker/setup-buildx-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: lerisngwa/landmarkapp:v1 .

      


    